version: '3.8'

services:
  # Web API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
      - PORT=5000
    depends_on:
      - mongo
      - redis
    volumes:
      - ./:/app
    restart: unless-stopped

  # Worker nodes for processing Instagram tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
      - MAX_CONCURRENT_TASKS=5
      - WORKER_ID=worker-${HOSTNAME}
    depends_on:
      - mongo
      - redis
    volumes:
      - ./:/app
    deploy:
      replicas: 3
    restart: unless-stopped

  # Target finding service
  target_finder:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - mongo
      - redis
    volumes:
      - ./:/app
    command: python target_finder.py
    restart: unless-stopped

  # MongoDB database
  mongo:
    image: mongo:5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # Redis queue
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Web UI (static files served by Nginx)
  web:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data: 